name: dev_flutter_test
description: dev_test implementation for flutter
version: 0.3.0
publish_to: none
environment:
  sdk: ^3.12.0

dependencies:
  meta: ">=1.18.0"
  flutter:
    sdk: flutter
  dev_test: ">=1.0.2-1"
  flutter_test:
    sdk: flutter
  tekartik_test_menu_flutter:
    git:
      url: https://github.com/tekartik/test_menu_flutter
      path: test_menu_flutter

dev_dependencies:
  dev_build: ">=1.1.7+3"
  tekartik_lints_flutter:
    git:
      url: https://github.com/tekartik/common_flutter.dart
      path: packages/lints_flutter
    version: '>=0.1.0'
  tekartik_common_utils:
    git:
      url: https://github.com/tekartik/common_utils.dart
    version: '>=0.6.5'
  process_run: ">=1.2.1+1"

